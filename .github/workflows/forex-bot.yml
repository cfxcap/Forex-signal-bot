name: Forex Signal Bot

on:
  schedule:
    # Runs every 15 minutes, matching the 15min candle timeframe and
    # keeping total daily API calls (5 pairs x 96 runs = 480/day) well
    # within Twelve Data's free 800/day limit.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab too

permissions:
  contents: write   # needed so the workflow can commit alerted.json back

jobs:
  check-signals:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run signal check
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 forex_signal_bot.py

      - name: Save alert history
        run: |
          git config user.name "forex-signal-bot"
          git config user.email "bot@users.noreply.github.com"
          git add alerted.json
          git diff --staged --quiet || git commit -m "Update alert history [skip ci]"
          git push
